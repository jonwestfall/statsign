<!doctype html>
<html>
  <body>
    <h2>Door E-Ink Control</h2>

    <form method="post" action="/update">
      <label>Status</label><br/>
      <select name="status">
        <option>IN OFFICE</option>
        <option>TEACHING</option>
        <option>IN A MEETING</option>
        <option>DO NOT DISTURB</option>
        <option>WORKING FROM HOME</option>
        <option>OUT</option>
      </select><br/><br/>

      <label>Back at</label><br/>
      <input name="back_at" placeholder="2:30 PM" /><br/><br/>

      <label>Note</label><br/>
      <input name="note" size="40" /><br/><br/>

      <label>Target</label><br/>
      <select name="target">
        <option value="579">5.79" (272x792)</option>
      </select><br/><br/>

      <button type="submit">Render + Push</button>
    </form>

    <h3>Preview</h3>
    <img src="/preview.png" style="border:1px solid #ccc; max-height:500px;">
  </body>
</html>
