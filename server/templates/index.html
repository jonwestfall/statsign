<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Statsign Controller</title>
    <style>
      body { font-family: sans-serif; max-width: 1080px; margin: 24px auto; }
      h2, h3 { margin-bottom: 8px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
      label { display: block; margin-top: 10px; font-weight: 600; }
      input, select, textarea { width: 100%; padding: 9px; box-sizing: border-box; font-size: 1rem; }
      textarea { min-height: 72px; }
      .buttons { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
      button { padding: 10px 14px; }
      #preview { width: 100%; border: 1px solid #ccc; margin-top: 12px; }
      #logs { background: #111; color: #e7e7e7; padding: 10px; min-height: 140px; white-space: pre-wrap; }
      .hint { color: #555; font-size: 0.92rem; }
      details { border: 1px solid #ddd; padding: 10px; border-radius: 6px; margin-top: 12px; }
    </style>
  </head>
  <body>
    <h2>Statsign Remote Door Sign Controller</h2>
    <p class="hint">Target BLE peripheral: <strong>{{ device_name }}</strong> · <a href="/presets">Edit presets</a></p>

    <div class="grid">
      <section>
        <label for="presetSelect">Preset</label>
        <div class="buttons" style="margin-top: 6px;">
          <select id="presetSelect"></select>
          <button onclick="applyPreset()">Apply preset</button>
        </div>

        <label for="status">Status (headline)</label>
        <input id="status" />

        <label for="message">Message</label>
        <textarea id="message"></textarea>

        <label for="location">Location</label>
        <input id="location" placeholder="Library" />

        <label for="return_time">Return time</label>
        <input id="return_time" placeholder="2:15 PM" />

        <label for="layout">Layout</label>
        <select id="layout">
          <option value="headline">headline</option>
          <option value="split">split</option>
          <option value="badge">badge</option>
        </select>

        <label for="icon">Icon / image</label>
        <select id="icon">
          <option value="">(none)</option>
          {% for icon in builtin_icons %}
          <option value="builtin:{{ icon }}">builtin:{{ icon }}</option>
          {% endfor %}
          {% for file in uploads %}
          <option value="upload:{{ file }}">upload:{{ file }}</option>
          {% endfor %}
        </select>

        <label for="uploadFile">Upload image (PNG/JPG)</label>
        <input id="uploadFile" type="file" accept=".png,.jpg,.jpeg,.bmp,.webp" />
      </section>

      <section>
        <h3>Preview</h3>
        <img id="preview" src="/preview.png" alt="Sign preview" />

        <div class="buttons">
          <button onclick="saveStateAndPreview()">Preview</button>
          <button onclick="pushToSign()">Push to sign</button>
          <button onclick="clearSign()">Clear sign</button>
          <button onclick="demoSign()">Demo sign</button>
        </div>

        <details>
          <summary>Advanced style options</summary>
          <label for="headline_size">Headline size</label><input id="headline_size" type="number" min="24" max="180" />
          <label for="message_size">Message size</label><input id="message_size" type="number" min="16" max="120" />
          <label for="footer_size">Footer size</label><input id="footer_size" type="number" min="10" max="80" />
          <label for="alignment">Alignment</label>
          <select id="alignment"><option>left</option><option>center</option><option>right</option></select>
          <label for="padding">Padding</label><input id="padding" type="number" min="0" max="100" />
          <label><input id="invert" type="checkbox" /> Invert colors</label>
          <label><input id="show_updated_timestamp" type="checkbox" /> Show timestamp</label>
          <label><input id="show_border" type="checkbox" /> Show border</label>
          <label><input id="debug_boxes" type="checkbox" /> Debug layout boxes</label>
          <label><input id="icon_dither" type="checkbox" /> Dither icon/image</label>
        </details>

        <h3>Logs</h3>
        <div id="logs">Ready.</div>
      </section>
    </div>

    <script>
      const INITIAL_STATE = {{ state | tojson }};

      function setLogs(lines) {
        document.getElementById('logs').textContent = Array.isArray(lines) ? lines.join('\n') : String(lines);
      }

      async function fetchJSON(url, options = {}) {
        const res = await fetch(url, options);
        const data = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(data));
        return data;
      }

      function hydrateForm(state) {
        for (const id of ['status','message','location','return_time','layout','icon']) {
          if (document.getElementById(id)) document.getElementById(id).value = state[id] ?? '';
        }
        const style = state.style || {};
        for (const id of ['headline_size','message_size','footer_size','alignment','padding']) {
          if (style[id] !== undefined) document.getElementById(id).value = style[id];
        }
        for (const id of ['invert','show_updated_timestamp','show_border','debug_boxes','icon_dither']) {
          document.getElementById(id).checked = !!style[id];
        }
      }

      function currentState() {
        return {
          status: document.getElementById('status').value,
          message: document.getElementById('message').value,
          location: document.getElementById('location').value,
          return_time: document.getElementById('return_time').value,
          layout: document.getElementById('layout').value,
          icon: document.getElementById('icon').value,
          variables: { location: document.getElementById('location').value, return_time: document.getElementById('return_time').value },
          style: {
            headline_size: Number(document.getElementById('headline_size').value || 86),
            message_size: Number(document.getElementById('message_size').value || 42),
            footer_size: Number(document.getElementById('footer_size').value || 20),
            alignment: document.getElementById('alignment').value,
            padding: Number(document.getElementById('padding').value || 18),
            invert: document.getElementById('invert').checked,
            show_updated_timestamp: document.getElementById('show_updated_timestamp').checked,
            show_border: document.getElementById('show_border').checked,
            debug_boxes: document.getElementById('debug_boxes').checked,
            icon_dither: document.getElementById('icon_dither').checked,
          },
        };
      }

      function refreshPreview() {
        document.getElementById('preview').src = `/preview.png?t=${Date.now()}`;
      }

      async function loadPresets() {
        const res = await fetchJSON('/api/presets');
        const select = document.getElementById('presetSelect');
        select.innerHTML = '<option value="">(select preset)</option>';
        for (const p of res.presets) {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = `${p.name} (${p.id})`;
          select.appendChild(opt);
        }
      }

      async function applyPreset() {
        try {
          const id = document.getElementById('presetSelect').value;
          if (!id) return;
          const res = await fetchJSON(`/api/presets/${id}/apply`, { method: 'POST' });
          hydrateForm(res.state);
          refreshPreview();
          setLogs(`Applied preset: ${id}`);
        } catch (err) { setLogs(`Apply preset failed: ${err.message}`); }
      }

      async function saveStateAndPreview() {
        try {
          await fetchJSON('/api/state', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(currentState()) });
          refreshPreview();
          setLogs('State updated.');
        } catch (err) { setLogs(`Preview failed: ${err.message}`); }
      }

      async function pushToSign() {
        try {
          await saveStateAndPreview();
          const res = await fetchJSON('/api/push', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}' });
          setLogs(res.logs || ['Push completed']);
        } catch (err) { setLogs(`Push failed: ${err.message}`); }
      }

      async function clearSign() {
        try { const res = await fetchJSON('/api/clear', { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' }); setLogs(res.logs || ['Clear command sent']); }
        catch (err) { setLogs(`Clear failed: ${err.message}`); }
      }

      async function demoSign() {
        try { const res = await fetchJSON('/api/demo', { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' }); setLogs(res.logs || ['Demo command sent']); }
        catch (err) { setLogs(`Demo failed: ${err.message}`); }
      }

      document.getElementById('uploadFile').addEventListener('change', async (evt) => {
        const file = evt.target.files[0];
        if (!file) return;
        try {
          const res = await fetchJSON('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': file.type || 'image/png', 'X-Filename': file.name },
            body: await file.arrayBuffer(),
          });
          const opt = document.createElement('option');
          opt.value = res.icon;
          opt.textContent = res.icon;
          document.getElementById('icon').appendChild(opt);
          document.getElementById('icon').value = res.icon;
          setLogs(`Uploaded ${res.filename}`);
        } catch (err) {
          setLogs(`Upload failed: ${err.message}`);
        }
      });

      hydrateForm(INITIAL_STATE);
      loadPresets();
    </script>
  </body>
</html>
