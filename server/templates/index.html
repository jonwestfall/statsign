<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Statsign Controller</title>
    <style>
      body { font-family: sans-serif; max-width: 1150px; margin: 24px auto; }
      .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
      label { display:block; margin-top:8px; font-weight:600; }
      input, select, textarea, button { width:100%; padding:8px; box-sizing:border-box; }
      textarea { min-height:72px; }
      .row { display:flex; gap:8px; }
      .row > * { flex:1; }
      #preview { width:100%; border:1px solid #ccc; }
      #logs { background:#111; color:#eee; padding:8px; min-height:120px; white-space:pre-wrap; }
      details { border:1px solid #ddd; padding:10px; margin-top:10px; }
      #designerWrap { border:1px solid #ddd; padding:10px; margin-top:10px; }
      #designerCanvas { width:100%; border:1px dashed #aaa; image-rendering:pixelated; background:#fff; }
    </style>
  </head>
  <body>
    <h2>Statsign Controller</h2>
    <p><small>API auth is enabled. Use generated Bearer tokens for remote scripts.</small></p>
    <p>BLE target: <strong>{{ device_name }}</strong> · <a href="/presets">Edit presets</a> · <a href="/schedule">Scheduling</a></p>
    <div class="grid">
      <section>
        <label>Preset</label>
        <div class="row"><select id="presetSelect"></select><button onclick="loadPreset()">Load preset</button><button onclick="applyPreset()">Apply</button></div>
        <div class="row" style="margin-top:8px;">
          <input id="presetName" placeholder="Preset name (for Save as Preset)" />
          <button onclick="saveAsPreset()">Save as Preset</button>
        </div>

        <label>Status</label><input id="status" />
        <label>Message</label><textarea id="message"></textarea>
        <div class="row">
          <div><label>Location</label><input id="location" /></div>
          <div><label>Return time</label><input id="return_time" /></div>
        </div>

        <label>Layout</label>
        <select id="layout" onchange="toggleDesigner()">
          <option value="headline">headline</option>
          <option value="split">split</option>
          <option value="badge">badge</option>
          <option value="designer">designer (WYSIWYG image)</option>
        </select>

        <label>Icon</label>
        <select id="icon">
          <option value="">(none)</option>
          {% for icon in builtin_icons %}<option value="builtin:{{ icon }}">builtin:{{ icon }}</option>{% endfor %}
          {% for file in uploads %}<option value="upload:{{ file }}">upload:{{ file }}</option>{% endfor %}
        </select>

        <label>Full image ref (designer layout)</label>
        <select id="image">
          <option value="">(none)</option>
          {% for file in uploads %}<option value="upload:{{ file }}">upload:{{ file }}</option>{% endfor %}
        </select>

        <label>Upload image</label><input id="uploadFile" type="file" accept=".png,.jpg,.jpeg,.bmp,.webp" />

        <details>
          <summary>Advanced style</summary>
          <div class="row">
            <div><label>Headline size</label><input id="headline_size" type="number" min="16" max="220" /></div>
            <div><label>Message size</label><input id="message_size" type="number" min="12" max="180" /></div>
            <div><label>Footer size</label><input id="footer_size" type="number" min="8" max="80" /></div>
          </div>
          <div class="row">
            <div><label>Align</label><select id="alignment"><option>left</option><option>center</option><option>right</option></select></div>
            <div><label>Padding</label><input id="padding" type="number" min="0" max="100" /></div>
          </div>
          <label><input id="invert" type="checkbox" /> Invert</label>
          <label><input id="show_updated_timestamp" type="checkbox" /> Show timestamp</label>
          <label><input id="show_border" type="checkbox" /> Show border</label>
          <label><input id="debug_boxes" type="checkbox" /> Debug boxes</label>
          <label><input id="icon_dither" type="checkbox" /> Dither</label>
        </details>
      </section>

      <section>
        <h3>Preview</h3>
        <img id="preview" src="/preview.png" />
        <div class="row" style="margin-top:8px;">
          <button onclick="saveStateAndPreview()">Preview</button>
          <button onclick="pushToSign()">Push</button>
          <button onclick="clearSign()">Clear</button>
          <button onclick="demoSign()">Demo</button>
        </div>

        <div id="designerWrap" style="display:none;">
          <h3>WYSIWYG Designer (800x272)</h3>
          <canvas id="designerCanvas" width="800" height="272"></canvas>
          <div class="row">
            <div><label>Designer text</label><input id="d_text" value="In a meeting" /></div>
            <div><label>Subtext</label><input id="d_subtext" value="Back at 2:30 PM" /></div>
          </div>
          <div class="row">
            <div><label>X</label><input id="d_x" type="number" value="30" /></div>
            <div><label>Y</label><input id="d_y" type="number" value="90" /></div>
            <div><label>Title size</label><input id="d_title_size" type="number" value="84" /></div>
            <div><label>Sub size</label><input id="d_sub_size" type="number" value="42" /></div>
          </div>
          <div class="row">
            <button onclick="drawDesigner()">Redraw</button>
            <button onclick="uploadDesignerImage()">Save as image + attach</button>
          </div>
        </div>

        <h3>Remote API tokens</h3>
        <div class="row">
          <input id="tokenName" placeholder="Token label (e.g. office laptop)" />
          <button onclick="createRemoteToken()">Generate token</button>
        </div>
        <textarea id="newToken" readonly placeholder="Generated token appears here once. Copy it now."></textarea>
        <div id="tokenRows"></div>

        <h3>Logs</h3>
        <div id="logs">Ready.</div>
      </section>
    </div>

    <script>
      const INITIAL_STATE = {{ state | tojson }};
      const API_TOKEN = {{ api_token | tojson }};
      const dCanvas = document.getElementById('designerCanvas');
      const dCtx = dCanvas.getContext('2d');
      let loadedPresetId = null;

      const log = (m) => document.getElementById('logs').textContent = Array.isArray(m) ? m.join('\n') : String(m);
      const refreshPreview = () => document.getElementById('preview').src = `/preview.png?t=${Date.now()}`;

      async function fetchJSON(url, options={}) {
        const headers = new Headers(options.headers || {});
        headers.set('Authorization', `Bearer ${API_TOKEN}`);
        const r = await fetch(url, { ...options, headers }); const d = await r.json(); if (!r.ok) throw new Error(JSON.stringify(d)); return d;
      }

      function hydrate(s) {
        for (const k of ['status','message','location','return_time','layout','icon','image']) {
          if (document.getElementById(k)) document.getElementById(k).value = s[k] ?? '';
        }
        const st = s.style || {};
        for (const k of ['headline_size','message_size','footer_size','alignment','padding']) if (st[k] !== undefined) document.getElementById(k).value = st[k];
        for (const k of ['invert','show_updated_timestamp','show_border','debug_boxes','icon_dither']) document.getElementById(k).checked = !!st[k];
      }

      const byId = (id) => document.getElementById(id);

      function statePayload() {
        return {
          status: byId("status").value, message: byId("message").value, location: byId("location").value, return_time: byId("return_time").value,
          layout: byId("layout").value, icon: byId("icon").value, image: byId("image").value,
          variables: { location: byId("location").value, return_time: byId("return_time").value },
          style: {
            headline_size: Number(byId("headline_size").value || 86), message_size: Number(byId("message_size").value || 42), footer_size: Number(byId("footer_size").value || 20),
            alignment: byId("alignment").value, padding: Number(byId("padding").value || 18), invert: byId("invert").checked,
            show_updated_timestamp: byId("show_updated_timestamp").checked, show_border: byId("show_border").checked,
            debug_boxes: byId("debug_boxes").checked, icon_dither: byId("icon_dither").checked,
          },
        };
      }

      async function loadPresets() {
        const res = await fetchJSON('/api/presets');
        const presetSelect = byId("presetSelect");
        presetSelect.innerHTML = '<option value="">(select preset)</option>';
        for (const p of res.presets) presetSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;

        if (loadedPresetId && res.presets.some((p) => p.id === loadedPresetId)) {
          presetSelect.value = loadedPresetId;
        }
      }
      async function loadPreset() {
        const presetSelect = byId("presetSelect");
        if (!presetSelect.value) return;
        const res = await fetchJSON('/api/presets');
        const preset = (res.presets || []).find((p) => p.id === presetSelect.value);
        if (!preset) {
          log(`Preset not found: ${presetSelect.value}`);
          return;
        }
        loadedPresetId = preset.id;
        byId('presetName').value = preset.name || '';
        hydrate(preset);
        toggleDesigner();
        refreshPreview();
        log(`Loaded ${preset.id} for editing`);
      }

      async function applyPreset() {
        const presetSelect = byId("presetSelect");
        if (!presetSelect.value) return;
        const res = await fetchJSON(`/api/presets/${presetSelect.value}/apply`, { method:'POST' });
        loadedPresetId = presetSelect.value;
        const selectedName = presetSelect.options[presetSelect.selectedIndex]?.text || '';
        byId('presetName').value = selectedName;
        hydrate(res.state); toggleDesigner(); refreshPreview(); log(`Applied ${presetSelect.value}`);
      }

      byId('presetSelect').addEventListener('change', (e) => {
        if (!e.target.value) loadedPresetId = null;
      });

      async function saveAsPreset() {
        const name = byId('presetName').value.trim() || 'New preset';
        const payload = { ...statePayload(), name };

        if (loadedPresetId) {
          await fetchJSON(`/api/presets/${loadedPresetId}`, {
            method: 'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload),
          });
          await loadPresets();
          log(`Updated preset: ${loadedPresetId}`);
          return;
        }

        const created = await fetchJSON('/api/presets', {
          method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload),
        });
        loadedPresetId = created.preset.id;
        byId('presetName').value = created.preset.name;
        await loadPresets();
        byId('presetSelect').value = loadedPresetId;
        log(`Created preset: ${loadedPresetId}`);
      }

      async function saveStateAndPreview() {
        await fetchJSON('/api/state', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(statePayload()) });
        refreshPreview(); log('State saved.');
      }
      async function pushToSign() { try { await saveStateAndPreview(); const r = await fetchJSON('/api/push', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' }); log(r.logs || ['Push complete']); } catch(e){log(e.message);} }
      async function clearSign() { try { const r = await fetchJSON('/api/clear', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' }); log(r.logs || ['Clear sent']); } catch(e){log(e.message);} }
      async function demoSign() { try { const r = await fetchJSON('/api/demo', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' }); log(r.logs || ['Demo sent']); } catch(e){log(e.message);} }

      function toggleDesigner() {
        const on = byId("layout").value === 'designer';
        byId("designerWrap").style.display = on ? 'block' : 'none';
      }

      function drawDesigner() {
        dCtx.fillStyle = byId("invert").checked ? '#000' : '#fff';
        dCtx.fillRect(0,0,800,272);
        dCtx.fillStyle = byId("invert").checked ? '#fff' : '#000';
        dCtx.font = `${Number(byId("d_title_size").value || 84)}px sans-serif`;
        dCtx.fillText(byId("d_text").value || '', Number(byId("d_x").value || 20), Number(byId("d_y").value || 90));
        dCtx.font = `${Number(byId("d_sub_size").value || 42)}px sans-serif`;
        dCtx.fillText(byId("d_subtext").value || '', Number(byId("d_x").value || 20), Number(byId("d_y").value || 90) + Number(byId("d_sub_size").value || 42) + 14);
        if (byId("show_border").checked) { dCtx.strokeStyle = byId("invert").checked ? '#fff' : '#000'; dCtx.strokeRect(1,1,798,270); }
      }

      async function uploadDesignerImage() {
        drawDesigner();
        const blob = await new Promise((resolve) => dCanvas.toBlob(resolve, 'image/png'));
        if (!blob) return;
        const res = await fetchJSON('/api/upload', { method:'POST', headers:{'Content-Type':'image/png','X-Filename':'designer.png'}, body: await blob.arrayBuffer() });
        const ref = res.image || res.icon;
        const opt = `<option value="${ref}">${ref}</option>`;
        byId("image").innerHTML += opt; byId("icon").innerHTML += opt;
        byId("image").value = ref; byId("icon").value = ref; byId("layout").value = 'designer'; toggleDesigner();
        await saveStateAndPreview();
        log(`Designer image uploaded: ${res.filename}`);
      }


      async function refreshTokens() {
        const res = await fetchJSON('/api/tokens');
        const wrap = byId('tokenRows');
        wrap.innerHTML = res.tokens.map((t) => `<div style="margin-top:8px;border:1px solid #ddd;padding:8px;">
          <strong>${t.name}</strong> <code>${t.prefix}…</code><br/>
          created: ${t.created_at}${t.last_used_at ? `<br/>last used: ${t.last_used_at}` : ''}
          <div><button onclick="deleteToken('${t.id}')">Revoke</button></div>
        </div>`).join('') || '<small>No remote tokens generated yet.</small>';
      }

      async function createRemoteToken() {
        const name = byId('tokenName').value || 'Remote API token';
        const res = await fetchJSON('/api/tokens', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name }) });
        byId('newToken').value = res.token;
        await refreshTokens();
        log('Token generated. Copy it now.');
      }

      async function deleteToken(tokenId) {
        await fetchJSON(`/api/tokens/${tokenId}`, { method: 'DELETE' });
        await refreshTokens();
        log(`Token ${tokenId} revoked.`);
      }

      byId("uploadFile").addEventListener('change', async (e) => {
        const file = e.target.files[0]; if (!file) return;
        const res = await fetchJSON('/api/upload', { method:'POST', headers:{'Content-Type': file.type || 'image/png', 'X-Filename': file.name}, body: await file.arrayBuffer() });
        const ref = res.image || res.icon;
        byId("icon").innerHTML += `<option value="${ref}">${ref}</option>`;
        byId("image").innerHTML += `<option value="${ref}">${ref}</option>`;
        byId("icon").value = ref; byId("image").value = ref; log(`Uploaded ${res.filename}`);
      });

      hydrate(INITIAL_STATE); loadPresets(); toggleDesigner(); drawDesigner(); refreshTokens();
    </script>
  </body>
</html>
